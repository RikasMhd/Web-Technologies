<html>
	<head>
		<style>
			.il1{
				display:inline;
				background-color:yellow;				
			}
			.block{
				display:block;
				background-color:lightgreen;
			}
			
			p.px{font-size:20px;}
			p.em{font-size:1.5em;}
			p.ex{font-size:10ex;}
			p.percent{font-size:150%;}
		</style>
	
	</head>
	<body>
		<h2 class="il1">This is inline</h2>
		<h2 class="il1">Another inline</h2>

		<div class="block">
			<h2 >This is Block</h2>
			<h2 >Another block</h2>
		</div>
		
		
		<h1>CSS measurements</h1>
		<p class="px">Font size is 20px</p>
		<p class="em">Font size is 1.5em</p>
		<p class="ex">Font size is 10ex</p>
		<p class="percent">Font size is 150%(percent)</p>
		
	</body>
